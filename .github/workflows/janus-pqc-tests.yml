name: janus-pqc-tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install runtime deps
        run: python -m pip install -r requirements.txt
      - name: Run black-box tests
        run: python run_tests_janus_pqc.py
  security-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system packages for SBOM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-dev libxslt-dev
      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install dev deps
        run: |
          python -m pip install -r requirements-dev.txt
          # ensure cyclonedx-bom is present explicitly
          python -m pip install cyclonedx-bom==4.1.2
      - name: Bandit static analysis
        run: bandit -r . -q || true
      - name: Generate SBOM (CycloneDX)
        run: python tools/generate_sbom.py
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
