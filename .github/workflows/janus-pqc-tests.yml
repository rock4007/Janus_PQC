name: janus-pqc-tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install runtime deps
        run: python -m pip install -r requirements.txt
      - name: Run black-box tests
        run: python run_tests_janus_pqc.py
      - name: Run main script smoke test
        run: python Janus_PQC
  security-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libxml2-dev libxslt-dev python3-dev
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dev deps
        run: |
          python -m pip install -r requirements-dev.txt
      - name: Install pip-audit
        run: |
          pip install pip-audit
      - name: Run pip-audit (non-blocking)
        continue-on-error: true
        run: |
          pip-audit --progress-spinner off --desc --strict -f cyclonedx-json -o sbom_deps.json
      - name: Bandit static analysis
        run: bandit -r . -q || true
      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0.15.5
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json
          fail-on-error: false
      - name: Verify SBOM file exists
        run: |
          ls -lah
          test -f sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: |
            sbom.json
            sbom_deps.json
