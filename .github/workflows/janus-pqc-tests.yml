name: janus-pqc-tests
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install runtime deps
        run: python -m pip install -r requirements.txt
      - name: Run black-box tests
        run: python run_tests_janus_pqc.py
      - name: Run main script smoke test
        run: python Janus_PQC
  security-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        continue-on-error: true
        run: python -m pip install --upgrade pip
      - name: Install dev deps
        continue-on-error: true
        run: |
          python -m pip install -r requirements-dev.txt
      - name: Run pip-audit (non-blocking)
        continue-on-error: true
        run: |
          python -m pip_audit --progress-spinner off --format cyclonedx --output sbom_deps.json || true
      - name: Bandit static analysis
        run: bandit -r . -q || true
      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0.15.5
        continue-on-error: true
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json
          fail-on-error: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ hashFiles('sbom.json') != '' }}
        with:
          name: cyclonedx-sbom
          path: sbom.json
      - name: Upload dependency SBOM artifact (if exists)
        if: ${{ hashFiles('sbom_deps.json') != '' }}
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cyclonedx-sbom-deps
          path: sbom_deps.json
